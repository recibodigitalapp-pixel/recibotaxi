<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Taxi Online</title>

<style>
:root {
    --primary: #f1c40f;
    --dark: #2c3e50;
    --light: #ecf0f1;
    --success: #27ae60;
}

body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #ecf0f1, #dfe6e9);

    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
}

.container {
    width: 100%;
    max-width: 420px;
    padding: 20px;
}

.card {
    background: #fff;
    border-radius: 20px;
    padding: 25px;
    box-shadow: 0 15px 40px rgba(0,0,0,0.1);
}

h2 {
    text-align: center;
    margin-bottom: 20px;
    color: var(--dark);
}

/* INPUT CENTRALIZADO */
.input-group {
    margin-bottom: 15px;
    display: flex;
    justify-content: center;
}

input {
    width: 90%;
    max-width: 320px;
    padding: 14px;
    border-radius: 10px;
    border: 1px solid #ddd;
    font-size: 15px;
    text-align: center;
    transition: 0.2s;
}

input:focus {
    border-color: var(--primary);
    outline: none;
    background: #fffbea;
}

/* BOTÃO */
.btn {
    width: 90%;
    max-width: 320px;
    margin: 20px auto 0 auto;
    display: block;
    padding: 16px;
    border: none;
    border-radius: 12px;
    background: var(--dark);
    color: white;
    font-size: 16px;
    font-weight: bold;
    cursor: pointer;
}

.btn:hover {
    background: #1f2d3a;
}

/* RECIBO */
#reciboTela {
    display: none;
}

.recibo {
    background: white;
    padding: 20px;
    border-radius: 15px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.1);
}

.recibo h3 {
    text-align: center;
    margin-bottom: 15px;
}

.linha {
    margin-bottom: 10px;
    font-size: 14px;
}

.valor {
    margin-top: 15px;
    padding: 15px;
    background: #f7f7f7;
    border-radius: 10px;
    text-align: center;
    font-size: 18px;
    font-weight: bold;
    color: var(--success);
}
</style>
</head>

<body>

<div class="container">

<!-- FORM -->
<div id="formTela" class="card">
    <h2>Taxi Online</h2>

    <div class="input-group"><input type="text" id="motorista" placeholder="Motorista"></div>
    <div class="input-group"><input type="tel" id="tel_motorista" placeholder="Telefone"></div>
    <div class="input-group"><input type="text" id="placa" placeholder="Placa"></div>
    <div class="input-group"><input type="text" id="origem" placeholder="Origem"></div>
    <div class="input-group"><input type="text" id="destino" placeholder="Destino"></div>
    <div class="input-group"><input type="datetime-local" id="data"></div>
    <div class="input-group"><input type="text" id="valor" placeholder="R$ 0,00"></div>
    <div class="input-group"><input type="text" id="cliente" placeholder="Cliente"></div>
    <div class="input-group"><input type="tel" id="tel_cliente" placeholder="Telefone Cliente"></div>

    <button class="btn" onclick="criarRecibo()">Criar Recibo</button>
</div>

<!-- RECIBO -->
<div id="reciboTela">
    <div class="recibo">
        <h3>RECIBO DE TAXI</h3>

        <div class="linha"><b>Motorista:</b> <span id="r_motorista"></span></div>
        <div class="linha"><b>Telefone:</b> <span id="r_tel_motorista"></span></div>
        <div class="linha"><b>Placa:</b> <span id="r_placa"></span></div>

        <hr>

        <div class="linha"><b>Origem:</b> <span id="r_origem"></span></div>
        <div class="linha"><b>Destino:</b> <span id="r_destino"></span></div>
        <div class="linha"><b>Data:</b> <span id="r_data"></span></div>

        <hr>

        <div class="linha"><b>Cliente:</b> <span id="r_cliente"></span></div>
        <div class="linha"><b>Telefone:</b> <span id="r_tel_cliente"></span></div>

        <div class="valor" id="r_valor"></div>
    </div>
</div>

</div>

<script>
// moeda automática
document.getElementById('valor').addEventListener('input', e => {
    let v = e.target.value.replace(/\D/g,'');
    v = (v/100).toLocaleString('pt-BR',{style:'currency',currency:'BRL'});
    e.target.value = v;
});

// data atual
window.onload = () => {
    const d = new Date();
    d.setMinutes(d.getMinutes() - d.getTimezoneOffset());
    document.getElementById('data').value = d.toISOString().slice(0,16);
};

function criarRecibo(){
    document.getElementById('formTela').style.display = 'none';
    document.getElementById('reciboTela').style.display = 'block';

    r_motorista.innerText = motorista.value;
    r_tel_motorista.innerText = tel_motorista.value;
    r_placa.innerText = placa.value;
    r_origem.innerText = origem.value;
    r_destino.innerText = destino.value;
    r_data.innerText = new Date(data.value).toLocaleString('pt-BR');
    r_cliente.innerText = cliente.value;
    r_tel_cliente.innerText = tel_cliente.value;
    r_valor.innerText = valor.value;
}
</script>

</body>
</html>
