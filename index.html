<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Taxi Online</title>

<style>
:root {
    --primary: #f1c40f;
    --dark: #2c3e50;
    --light: #ecf0f1;
    --success: #27ae60;
}

body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #ecf0f1, #dfe6e9);
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
}

.container {
    width: 100%;
    max-width: 420px;
    padding: 15px;
}

.card {
    background: #fff;
    border-radius: 20px;
    padding: 25px;
    box-shadow: 0 15px 40px rgba(0,0,0,0.1);
}

h2 {
    text-align: center;
    margin-bottom: 20px;
    color: var(--dark);
}

.input-group {
    margin-bottom: 15px;
}

input {
    width: 100%;
    padding: 14px;
    border-radius: 10px;
    border: 1px solid #ddd;
    font-size: 15px;
    text-align: center;
}

input:focus {
    border-color: var(--primary);
    outline: none;
    background: #fffbea;
}

.btn {
    width: 100%;
    padding: 16px;
    border: none;
    border-radius: 12px;
    background: var(--dark);
    color: white;
    font-size: 16px;
    font-weight: bold;
    cursor: pointer;
}

/* RECIBO */
#reciboTela {
    display: none;
}

.recibo {
    background: white;
    padding: 20px;
    border-radius: 15px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.1);
    text-align: center;
}

.linha {
    margin-bottom: 8px;
}

.valor {
    margin-top: 15px;
    padding: 15px;
    background: #f7f7f7;
    border-radius: 10px;
    font-size: 20px;
    font-weight: bold;
    color: var(--success);
}
</style>
</head>

<body>

<div class="container">

<div id="formTela" class="card">
    <h2>Taxi Online</h2>

    <div class="input-group">
        <input type="text" id="motorista" placeholder="Motorista">
    </div>

    <div class="input-group">
        <input type="tel" id="tel_motorista" placeholder="Telefone">
    </div>

    <div class="input-group">
        <input type="text" id="placa" placeholder="Placa (7 caracteres)" maxlength="7">
    </div>

    <div class="input-group">
        <input type="text" id="origem" placeholder="Origem">
    </div>

    <div class="input-group">
        <input type="text" id="destino" placeholder="Destino">
    </div>

    <div class="input-group">
        <input type="datetime-local" id="data">
    </div>

    <div class="input-group">
        <input type="tel" id="valor" placeholder="R$ 0,00" inputmode="numeric">
    </div>

    <div class="input-group">
        <input type="text" id="cliente" placeholder="Cliente">
    </div>

    <div class="input-group">
        <input type="tel" id="tel_cliente" placeholder="Telefone Cliente">
    </div>

    <button class="btn" onclick="criarRecibo()">Criar Recibo</button>
</div>

<div id="reciboTela">
    <div class="recibo">
        <h3>RECIBO DE TAXI</h3>

        <div class="linha"><b>Motorista:</b> <span id="r_motorista"></span></div>
        <div class="linha"><b>Telefone:</b> <span id="r_tel_motorista"></span></div>
        <div class="linha"><b>Placa:</b> <span id="r_placa"></span></div>

        <hr>

        <div class="linha"><b>Origem:</b> <span id="r_origem"></span></div>
        <div class="linha"><b>Destino:</b> <span id="r_destino"></span></div>
        <div class="linha"><b>Data:</b> <span id="r_data"></span></div>

        <hr>

        <div class="linha"><b>Cliente:</b> <span id="r_cliente"></span></div>
        <div class="linha"><b>Telefone:</b> <span id="r_tel_cliente"></span></div>

        <div class="valor" id="r_valor"></div>
    </div>
</div>

</div>

<script>
// --- DATA AUTOMÁTICA ---
window.onload = () => {
    const d = new Date();
    d.setMinutes(d.getMinutes() - d.getTimezoneOffset());
    document.getElementById('data').value = d.toISOString().slice(0,16);
};

// --- MÁSCARA TELEFONE ---
function mascaraTelefone(v) {
    v = v.replace(/\D/g, '');
    v = v.replace(/^(\d{2})(\d)/g, "($1) $2");
    v = v.replace(/(\d{5})(\d)/, "$1-$2");
    return v;
}

tel_motorista.addEventListener('input', e => {
    e.target.value = mascaraTelefone(e.target.value);
});

tel_cliente.addEventListener('input', e => {
    e.target.value = mascaraTelefone(e.target.value);
});

// --- PLACA MAIÚSCULA ---
placa.addEventListener('input', e => {
    e.target.value = e.target.value.toUpperCase();
});

// --- MÁSCARA REAL ---
valor.addEventListener('input', e => {
    let v = e.target.value.replace(/\D/g,'');
    v = (v/100).toLocaleString('pt-BR',{style:'currency',currency:'BRL'});
    e.target.value = v;
});

// --- CRIAR RECIBO ---
function criarRecibo(){
    formTela.style.display = 'none';
    reciboTela.style.display = 'block';

    r_motorista.innerText = motorista.value;
    r_tel_motorista.innerText = tel_motorista.value;
    r_placa.innerText = placa.value;
    r_origem.innerText = origem.value;
    r_destino.innerText = destino.value;
    r_data.innerText = new Date(data.value).toLocaleString('pt-BR');
    r_cliente.innerText = cliente.value;
    r_tel_cliente.innerText = tel_cliente.value;
    r_valor.innerText = valor.value;
}
</script>

</body>
</html>
